# =============================================================================
# Configurações do Projeto Inteligência de Frota
# =============================================================================

# Projeto
project:
  name: "inteligencia_frota"
  version: "1.0.0"
  description: "Pipeline completo de inteligência de frota com dados reais (ANP, IBGE, DENATRAN)"

# Paths
paths:
  raw_data: "data/raw"
  staging: "staging"
  warehouse: "warehouse"
  analytics: "analytics"
  logs: "logs"
  dashboard: "dashboard"

# Banco de dados
database:
  # PostgreSQL (producao - padrao)
  engine: "postgresql"
  host: "localhost"
  port: 5432
  name: "inteligencia_frota"
  user: "postgres"
  password: "adm123"
  # SQLite (alternativa para desenvolvimento local)
  # engine: "sqlite"
  # path: "data/inteligencia_frota.db"

# Fontes de dados
data_sources:
  anp:
    name: "Agência Nacional do Petróleo"
    url: "https://www.gov.br/anp/pt-br/centrais-de-conteudo/dados-abertos"
    format: "csv"
    frequency: "mensal"
    fallback: true  # Gerar dados simulados se download falhar

  ibge:
    name: "Instituto Brasileiro de Geografia e Estatística"
    api_url: "https://servicodados.ibge.gov.br/api/v3"
    format: "json"
    frequency: "anual"
    indicadores:
      - "IPCA"
      - "PIB"
      - "SALARIO"
      - "POPULACAO"
    fallback: true

  denatran:
    name: "Departamento Nacional de Trânsito"
    url: "https://www.gov.br/infraestrutura/pt-br/assuntos/transito/denatran"
    format: "csv"
    frequency: "anual"
    fallback: true

# Parâmetros de geração de frota
fleet:
  num_veiculos: 500
  meses_historico: 24
  seed: 42

# Limites para análise prescritiva
limits:
  custo_por_km:
    critico: 2.50
    atencao: 1.80
  margem_operacional:
    critico: 0.10
    atencao: 0.20
  disponibilidade_pct:
    critico: 75.0
    atencao: 85.0
  km_por_litro_real:
    critico: 3.0
    atencao: 4.5

# Configuração do Airflow
airflow:
  schedule: "@monthly"
  start_date: "2024-01-01"
  retries: 2
  retry_delay_minutes: 5
  email_on_failure: false
  catchup: false

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/pipeline.log"
  max_size_mb: 50
  backup_count: 5